<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workforce | Employee Manager</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #22c55e;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
        }

        /* Form Styling */
        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width { grid-column: span 2; }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s;
            outline: none;
            background: #f9fafb;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            background: #fff;
        }

        .btn-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary { background: var(--primary); color: white; flex: 2; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }

        .btn-secondary { background: #e2e8f0; color: #475569; flex: 1; }
        .btn-secondary:hover { background: #cbd5e1; }

        /* Table Styling */
        .table-container {
            overflow-x: auto;
            background: white;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #f8fafc;
            padding: 16px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f1f5f9; }

        .role-badge {
            background: #eef2ff;
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            padding: 8px;
            border-radius: 6px;
            font-size: 1rem;
        }

        .edit-btn { color: var(--primary); background: #eef2ff; }
        .edit-btn:hover { background: var(--primary); color: white; }

        .delete-btn { color: var(--danger); background: #fef2f2; }
        .delete-btn:hover { background: var(--danger); color: white; }

        /* Responsive */
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h2><i class="fas fa-users-gear"></i> TeamFlow</h2>
            <p>Manage your organization's talent seamlessly</p>
        </header>

        <!-- Form Card -->
        <div class="card">
            <h3 style="margin-bottom: 20px; font-size: 1.1rem;">Add / Edit Member</h3>
            <input type="hidden" id="empId">
            <div class="form-grid">
                <div class="full-width">
                    <input type="text" id="name" placeholder="Full Name (e.g. John Doe)">
                </div>
                <input type="text" id="role" placeholder="Job Role (e.g. Designer)">
                <input type="email" id="email" placeholder="Email Address">
            </div>
            <div class="btn-group">
                <button class="btn-primary" onclick="saveEmployee()">
                    <i class="fas fa-save"></i> Save Employee
                </button>
                <button class="btn-secondary" onclick="clearForm()">
                    <i class="fas fa-eraser"></i> Clear
                </button>
            </div>
        </div>

        <!-- Table -->
        <div class="table-container">
            <table id="empTable">
                <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Role</th>
                        <th>Email</th>
                        <th style="text-align: right;">Actions</th>
                    </tr>
                </thead>
                <tbody id="empBody">
                    <!-- Data will appear here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Storage Key
        const STORAGE_KEY = "modern_employee_data";

        // Initialize Data
        let employees = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        function loadEmployees() {
            const tbody = document.getElementById("empBody");
            tbody.innerHTML = "";

            if (employees.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#94a3b8; padding:40px;">No records found. Add your first employee above.</td></tr>`;
                return;
            }

            employees.forEach((emp) => {
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight:600;">${emp.name}</td>
                        <td><span class="role-badge">${emp.role}</span></td>
                        <td style="color:#64748b;">${emp.email}</td>
                        <td>
                            <div class="action-btns" style="justify-content: flex-end;">
                                <button class="btn-icon edit-btn" onclick="editEmployee('${emp.id}')" title="Edit">
                                    <i class="fas fa-pen-to-square"></i>
                                </button>
                                <button class="btn-icon delete-btn" onclick="deleteEmployee('${emp.id}')" title="Delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        function saveEmployee() {
            const id = document.getElementById("empId").value;
            const name = document.getElementById("name").value;
            const role = document.getElementById("role").value;
            const email = document.getElementById("email").value;

            if (!name || !role || !email) {
                alert("Please fill in all fields");
                return;
            }

            if (id) {
                // Update
                const index = employees.findIndex(e => e.id == id);
                employees[index] = { id, name, role, email };
            } else {
                // Create
                const newEmp = {
                    id: Date.now().toString(),
                    name,
                    role,
                    email
                };
                employees.push(newEmp);
            }

            localStorage.setItem(STORAGE_KEY, JSON.stringify(employees));
            clearForm();
            loadEmployees();
        }

        function deleteEmployee(id) {
            if (confirm("Are you sure you want to remove this employee?")) {
                employees = employees.filter(emp => emp.id != id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(employees));
                loadEmployees();
            }
        }

        function editEmployee(id) {
            const emp = employees.find(e => e.id == id);
            if (emp) {
                document.getElementById("empId").value = emp.id;
                document.getElementById("name").value = emp.name;
                document.getElementById("role").value = emp.role;
                document.getElementById("email").value = emp.email;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function clearForm() {
            document.getElementById("empId").value = "";
            document.getElementById("name").value = "";
            document.getElementById("role").value = "";
            document.getElementById("email").value = "";
        }

        // Initial Load
        loadEmployees();
    </script>
</body>
</html>
